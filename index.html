<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Todo List App</title>
</head>
<body>
  <p>Todo List</p>
  <div class="todo-row todo-input-row">
    <input type="text" class="todo-name task" placeholder="Todo name">
    <input type="date" class="todo-due-date date">
    <button class="add-todo-button">Add</button>
  </div>
  <div class="tasks todo-list"></div>
  <script src="script.js" defer></script>
</body>
</html>
